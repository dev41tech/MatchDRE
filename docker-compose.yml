services:
  backend:
    build:
      context: ./src/backend
    env_file:
      - ./src/backend/.env
    environment:
      PORT: 3011
    ports:
      - "3011:3011"
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
    environment:
      API_UPSTREAM: http://api.matchdre.41tech.cloud
    depends_on:
      - backend
    ports:
      - "85:85"
    restart: unless-stopped
